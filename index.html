<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin-top:20px;
}
</style>

</head>

<body>

<h1>🚀 My Telegram Mini App</h1>

<p>Bienvenue dans ma mini app</p>

<button onclick="showUser()">Voir mon ID Telegram</button>

<p id="user"></p>

<script>

let tg = window.Telegram.WebApp
tg.expand()

function showUser(){

let user = tg.initDataUnsafe.user

if(user){
document.getElementById("user").innerHTML =
"Ton ID Telegram : " + user.id
}

}

</script>

</body>
</html>
