<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CALI NORD MENU</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:linear-gradient(90deg,#0b1a3a,#2b0b3a);
text-align:center;
padding:20px;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.menu button{
background:#121212;
border:1px solid #7d2cff;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:#7d2cff;
}

.container{
display:none;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.active{
display:grid;
}

.product{
background:#121212;
border-radius:12px;
padding:15px;
text-align:center;
}

.product img{
width:100px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
}

.product img:hover{
transform:scale(1.15);
box-shadow:0 0 20px #7d2cff;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#c48bff;
}

.price{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
background:#0a0a0a;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:15px;
}

.price div{
display:flex;
justify-content:space-between;
padding:5px;
}

.button{
background:#7d2cff;
padding:10px;
border-radius:8px;
text-decoration:none;
color:white;
display:inline-block;
}

</style>

</head>

<body>

<div class="header">
<h2>🚚 CALI NORD MENU</h2>
</div>

<!-- MENU -->
<div class="menu">
<button onclick="showPage('fleurs')">🌿 FLEURS NL x US</button>
<button onclick="showPage('hash')">🍫 HASH RÉSINE</button>
<button onclick="showPage('dure')">💎 DURE</button>
</div>

<!-- FLEURS -->
<div id="fleurs" class="container active">

<div class="product">
<div class="title">C1</div>
<img src="IMG_0672.jpeg">
</div>

<div class="product">
<div class="title">C2</div>
<img src="IMG_0671.jpeg">
</div>

<div class="product">
<div class="title">C3</div>
<img src="IMG_0669.jpeg">
</div>

<div class="product">
<div class="title">C4</div>
<img src="IMG_0673.jpeg">
</div>

<div class="product">
<div class="title">C5</div>
<img src="IMG_0478.png">
</div>

</div>

<!-- HASH -->
<div id="hash" class="container">

<div class="product">
<div class="title">DRY SIFT</div>
<img src="IMG_0686.jpeg">
</div>

<div class="product">
<div class="title">MOUSSEUX</div>
<img src="IMG_0670.jpeg">
</div>

</div>

<!-- DURE -->
<div id="dure" class="container">

<div class="product">
<div class="title">Z</div>
</div>

<div class="product">
<div class="title">K</div>
</div>

<div class="product">
<div class="title">P</div>
</div>

</div>

<script>
function showPage(page){
document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
