<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CALI NORD MENU</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#0b1a3a,#2b0b3a);
text-align:center;
padding:20px;
}

.snaplogo{
color:#000;
background:#fffc00;
padding:8px 16px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
display:inline-block;
margin-bottom:10px;
}

.main-logo{
width:220px;
display:block;
margin:auto;
margin-top:10px;
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.menu button{
background:#121212;
border:1px solid #7d2cff;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:#7d2cff;
}

/* CONTAINER */
.container{
display:none;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.active{
display:grid;
}

/* PRODUCT */
.product{
background:#121212;
border-radius:12px;
padding:15px;
text-align:center;
}

.product img{
width:100px;
border-radius:10px;
margin-bottom:10px;
transition:0.3s;
}

.product img:hover{
transform:scale(1.15);
box-shadow:0 0 20px #7d2cff;
}

.title{
color:#c48bff;
font-weight:bold;
margin-bottom:10px;
}

/* PRICE */
.price{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
background:#0a0a0a;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:10px;
}

.price div{
display:flex;
justify-content:space-between;
}

/* BUTTON */
.button{
background:linear-gradient(90deg,#c48bff,#7d2cff);
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<a class="snaplogo" href="https://snapchat.com/add/nord_cali62">
👻 SNAP : nord_cali62
</a>

<img src="IMG_0683.jpeg" class="main-logo">

</div>

<!-- MENU -->
<div class="menu">
<button onclick="showPage('fleurs')">🌿 FLEURS NL x US</button>
<button onclick="showPage('hash')">🍫 HASH RÉSINE</button>
<button onclick="showPage('dure')">💎 DURE</button>
</div>

<!-- FLEURS -->
<div id="fleurs" class="container active">

<div class="product">
<div class="title">C1 🍁</div>
<img src="IMG_0672.jpeg">
<div class="price">
<div><p>1G</p><span>10€</span></div>
<div><p>5G</p><span>40€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

<div class="product">
<div class="title">C5 🍁</div>
<img src="IMG_0478.png">
<div class="price">
<div><p>1G</p><span>10€</span></div>
<div><p>5G</p><span>40€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

</div>

<!-- HASH -->
<div id="hash" class="container">

<div class="product">
<div class="title">DRY SIFT u45</div>
<img src="IMG_0686.jpeg">
<div class="price">
<div><p>1G</p><span>10€</span></div>
<div><p>5G</p><span>35€</span></div>
<div><p>1K</p><span>3200€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

<div class="product">
<div class="title">Mousseux</div>
<img src="IMG_0670.jpeg">
<div class="price">
<div><p>10G</p><span>40€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

</div>

<!-- DURE -->
<div id="dure" class="container">

<div class="product">
<div class="title">Z ❄️</div>
<div class="price">
<div><p>1G</p><span>50€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

<div class="product">
<div class="title">K 🦄</div>
<div class="price">
<div><p>1G</p><span>10€</span></div>
</div>
<a class="button" href="https://snapchat.com/add/nord_cali62">Commander</a>
</div>

</div>

<script>
function showPage(page){
document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
