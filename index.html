<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CALI NORD MENU</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:linear-gradient(90deg,#0b1a3a,#2b0b3a);
text-align:center;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* SNAP LOGO */
.cnlogo{
font-size:26px;
font-weight:bold;
margin-bottom:5px;
letter-spacing:2px;
}

.snaplogo{
color:#000;
background:#fffc00;
display:inline-block;
padding:6px 12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 10px #fffc00;
animation:snapGlow 2s infinite alternate;
}

@keyframes snapGlow{
from{box-shadow:0 0 5px #fffc00;}
to{box-shadow:0 0 20px #ffd500;}
}

.menu-title{
font-size:20px;
font-weight:bold;
letter-spacing:2px;
margin-top:8px;
}

.logo{
font-size:14px;
color:#b66dff;
margin-top:6px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
opacity:0.6;
text-shadow:0 0 5px #b66dff;
}
to{
opacity:1;
text-shadow:0 0 15px #b66dff,0 0 25px #7d2cff;
}
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.product{
background:#121212;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 0 12px rgba(0,0,0,0.7);
transition:0.2s;
border:1px solid rgba(180,120,255,0.2);
}

.product:hover{
transform:scale(1.04);
box-shadow:0 0 20px rgba(160,80,255,0.6);
}

.product img{
width:100px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#c48bff;
}

.price{
background:#0a0a0a;
padding:10px;
border-radius:10px;
border:1px solid rgba(180,120,255,0.25);
font-size:14px;
margin-bottom:15px;
}

.price div{
display:flex;
justify-content:space-between;
padding:4px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.price div:last-child{
border-bottom:none;
}

.price span{
color:#c48bff;
font-weight:bold;
}

.price div:hover{
background:rgba(180,120,255,0.08);
border-radius:6px;
}

.button{
display:inline-block;
background:linear-gradient(90deg,#c48bff,#7d2cff);
color:white;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.2s;
}

.button:hover{
transform:scale(1.1);
box-shadow:0 0 15px #7d2cff;
}

.button:active{
transform:scale(0.95);
}

</style>

</head>

<body>

<div class="header">

<div class="cnlogo">
<a class="snaplogo" href="https://snapchat.com/add/nord_cali62">
👻 nord_cali62
</a>
</div>

<div class="menu-title">CALI NORD MENU</div>

<div class="logo">Express livraison 59/62 🚚</div>

</div>
