<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Menu</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
background:#020617;
}

/* GRILLE PRODUITS /

.container{
max-width:500px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/ CARTE PRODUIT /

.product{
background:#020617;
border-radius:14px;
padding:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.6);
text-align:center;
}

/ IMAGE STYLE TELEGRAM /

.product img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

/ PRIX /

.price{
margin-top:10px;
font-size:14px;
font-weight:bold;
line-height:1.6;
}

/ BOUTON SNAP */

.button{
display:block;
margin-top:10px;
padding:10px;
background:#fffc00;
color:black;
font-weight:bold;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

</style>

</head>
