<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

.notice{
background:#1e293b;
margin:10px;
padding:12px;
border-radius:10px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:10px 0 5px 0;
font-size:16px;
}

.price{
color:#22c55e;
font-weight:bold;
}

.footer{
text-align:center;
padding:20px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="header">
CALI NORD
</div>

<div class="notice">
Catalogue produits
</div>

<div class="products">

<div class="card">
<img src="IMG_0273.png">
<h3>Produit 1</h3>
<div class="price">à partir de 10€</div>
</div>

<div class="card">
<img src="IMG_0274.png">
<h3>Produit 2</h3>
<div class="price">à partir de 15€</div>
</div>

<div class="card">
<img src="IMG_0471.jpeg">
<h3>Produit 3</h3>
<div class="price">à partir de 20€</div>
</div>

</div>

<div class="footer">
Commande uniquement via Snapchat
</div>

</body>
</html>
