<!DOCTYPE html>

<title>Catalogue</title>

background:#0f172a;

}

background:#1e293b;

}

.products{

}

.product{

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.product img{
width:100%;
display:block;
}

.price{
padding:15px;
text-align:center;
font-size:16px;
line-height:1.8;
}

</style>
</head>
