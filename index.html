<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CALI NORD MENU</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#0b1a3a,#2b0b3a);
text-align:center;
padding:20px;
overflow:hidden;
}

.snaplogo{
color:#000;
background:#fffc00;
padding:8px 16px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
display:inline-block;
margin-bottom:10px;
}

/* LOGO */
.main-logo{
width:100%;
max-width:320px;
height:auto;
display:block;
margin:auto;
margin-top:10px;
object-fit:contain;
}

/* 🔥 BIENVENUE */
.welcome{
text-align:center;
margin-top:10px;
font-size:22px;
color:#c48bff;
font-weight:bold;
animation:fadeGlow 2s infinite alternate;
}

@keyframes fadeGlow{
0%{
opacity:0.6;
transform:translateY(0);
text-shadow:0 0 5px #7d2cff;
}
100%{
opacity:1;
transform:translateY(-5px);
text-shadow:0 0 20px #c48bff, 0 0 30px #7d2cff;
}
}

.category-hint{
text-align:center;
margin-top:10px;
margin-bottom:5px;
font-size:14px;
color:#c48bff;
font-weight:bold;
}

.arrow{
display:block;
font-size:22px;
animation:bounce 1.2s infinite;
margin-top:5px;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(6px);}
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.menu button{
background:#121212;
border:1px solid #7d2cff;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:#7d2cff;
}

/* CONTAINER */
.container{
display:none;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.active{
display:grid;
}

/* PRODUCT */
.product{
background:#121212;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 0 12px rgba(0,0,0,0.7);
}

.product img{
width:100px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
}

.product img:hover{
transform:scale(1.15);
box-shadow:0 0 20px #7d2cff;
}

.title{
color:#c48bff;
font-weight:bold;
margin-bottom:10px;
}

/* PRICE */
.price{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
background:#0a0a0a;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:10px;
}

.price div{
display:flex;
justify-content:space-between;
color:white;
background:rgba(255,255,255,0.03);
padding:5px 6px;
border-radius:6px;
}

.price span{
color:#c48bff;
font-weight:bold;
}

/* BUTTON */
.button{
background:linear-gradient(90deg,#c48bff,#7d2cff);
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
font-weight:bold;
}

/* MODAL */
#imgModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
}

#imgModal img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

</style>

</head>

<body>

<div class="header">

<a class="snaplogo" href="https://snapchat.com/add/nord_cali62">
👻 SNAP : nord_cali62
</a>

<img src="IMG_0683.jpeg" class="main-logo">

</div>

<h2 class="welcome">Bienvenue 👋</h2>

<div class="category-hint">
Clique sur la catégorie de ton choix
<span class="arrow">👇</span>
</div>

<div class="menu">
<button onclick="showPage('fleurs')">🌿 FLEURS NL x US</button>
<button onclick="showPage('hash')">🍫 HASH RÉSINE</button>
<button onclick="showPage('dure')">💎 DURE</button>
</div>

<!-- FLEURS -->
<div id="fleurs" class="container active">
<!-- (tout ton contenu fleurs inchangé) -->
</div>

<!-- HASH -->
<div id="hash" class="container">
<!-- (tout ton contenu hash inchangé) -->
</div>

<!-- DURE -->
<div id="dure" class="container">
<!-- (tout ton contenu dure inchangé) -->
</div>

<!-- MODAL -->
<div id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
function showPage(page){
document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

function openModal(src){
document.getElementById("imgModal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeModal(){
document.getElementById("imgModal").style.display="none";
}
</script>

</body>
</html>
