<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catalogue</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
}

.header{
text-align:center;
padding:25px;
font-size:26px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:1fr;
gap:25px;
padding:20px;
max-width:500px;
margin:auto;
}

.product{
background:#1e293b;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
display:block;
}

.price{
padding:18px;
text-align:center;
line-height:1.8;
font-size:16px;
}

.buy{
display:block;
margin:15px;
padding:12px;
text-align:center;
background:#facc15;
border-radius:10px;
font-weight:bold;
text-decoration:none;
color:black;
transition:0.2s;
}

.buy:hover{
background:#eab308;
}

.footer{
text-align:center;
font-size:12px;
opacity:0.6;
padding:20px;
}

</style>
</head>

<body>

<div class="header">
Catalogue
</div>

<div class="products">

</div>

</div>

</div>
